name: Deploy AASIQ OS to GitHub Pages

on:
  # deploy.yml is a MANUAL FALLBACK only.
  # sync.yml handles all automatic deployments on push to main.
  # Having both trigger on push causes a race condition for the GitHub Pages slot.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # No `lfs: true` needed — split files are regular git objects under 4 MB each

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Build admin panel
        working-directory: admin
        run: npm run build
        env:
          VITE_BASE_URL: /admin/

      - name: Verify build output
        run: |
          echo "=== admin/dist ==="
          ls -la admin/dist/
          echo "=== admin/dist/assets ==="
          ls -la admin/dist/assets/ 2>/dev/null || echo "(no assets dir)"
          echo "=== dist/index.html ==="
          cat admin/dist/index.html

      - name: Assemble site with split data files
        run: |
          mkdir -p _site/portfolio _site/admin

          # Portfolio HTML
          cp portfolio/index.html _site/index.html
          cp portfolio/index.html _site/404.html

          # All 5 split data files
          for f in \
            portfolio/data_main.json \
            portfolio/data_creds_1.json \
            portfolio/data_creds_2.json \
            portfolio/data_creds_3.json \
            portfolio/data_creds_4.json \
            portfolio/data_creds_5.json; do
            if [ -f "$f" ]; then
              cp "$f" "_site/$f"
              echo "Copied $f ($(stat -c%s "_site/$f") bytes)"
            else
              echo "WARNING: $f not found — skipping"
            fi
          done

          # Admin panel
          cp -r admin/dist/. _site/admin/

          echo "=== Final _site ==="
          find _site -type f | sort

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

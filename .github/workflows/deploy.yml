name: Deploy AASIQ OS to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Build admin panel
        working-directory: admin
        run: npm run build
        env:
          VITE_BASE_URL: /admin/

      - name: Verify build output
        run: |
          echo "=== admin/dist ==="
          ls -la admin/dist/
          echo "=== admin/dist/assets ==="
          ls -la admin/dist/assets/
          echo "=== dist/index.html ==="
          cat admin/dist/index.html

      - name: Assemble site
        run: |
          mkdir -p _site/admin
          cp portfolio/index.html _site/index.html
          cp portfolio/index.html _site/404.html
          cp -r admin/dist/. _site/admin/
          echo "=== Final _site ==="
          find _site -type f | sort

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

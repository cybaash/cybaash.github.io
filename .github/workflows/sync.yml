##############################################################################
#  sync.yml — Power-Sync v3: smart rebuild + split-file data + deploy
#
#  data.json is split into 5 smaller files for performance:
#    portfolio/data_main.json        (~47 KB)  — about/contact/skills/experience/projects/flags
#    portfolio/data_creds_1.json     (~1.5 MB) — credentials batch 1
#    portfolio/data_creds_2.json     (~3.3 MB) — credentials batch 2
#    portfolio/data_creds_3.json     (~3.3 MB) — credentials batch 3
#    portfolio/data_creds_4.json     (~3.2 MB) — credentials batch 4
#    portfolio/data_creds_5.json     (  ~1 KB) — credentials batch 5 (overflow buffer)
#
#  Smart rebuild logic:
#  - Data-only saves (admin panel) → skip npm install + Vite build, reuse
#    cached admin dist. Pages deploys in ~30s instead of ~3 min.
#  - Code changes (src/, index.html, package.json etc.) → full rebuild.
#
#  Trigger: every push to main (admin no longer uses [skip ci]), or manually.
##############################################################################

name: Power-Sync ▸ Verify, Mirror & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group:             pages
  cancel-in-progress: false

env:
  NODE_VERSION:   "20"
  PYTHON_VERSION: "3.12"

jobs:

  # ── Job 1: detect what changed & verify JSON files ─────────────────────────
  verify:
    name: "① Verify & detect changes"
    runs-on: ubuntu-latest
    outputs:
      total_creds: ${{ steps.stats.outputs.total_creds }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect whether admin rebuild is needed
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "UNKNOWN")
          echo "Changed files:"
          echo "$CHANGED"

          if [ "$CHANGED" = "UNKNOWN" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "→ Unknown diff, forcing full rebuild"
            exit 0
          fi

          # Any file outside portfolio/data_*.json triggers a full rebuild
          NON_DATA=$(echo "$CHANGED" | grep -vE '^portfolio/data.*\.json$' || true)

          if [ -n "$NON_DATA" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "→ Non-data files changed, full rebuild required:"
            echo "$NON_DATA"
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "→ Data-only save — will skip npm build and reuse cached admin dist"
          fi

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate all split JSON files
        id: verify_step
        run: |
          python3 - << 'EOF'
          import json, sys, os

          FILES = [
            'portfolio/data_main.json',
            'portfolio/data_creds_1.json',
            'portfolio/data_creds_2.json',
            'portfolio/data_creds_3.json',
            'portfolio/data_creds_4.json',
            'portfolio/data_creds_5.json',
          ]
          MAIN_KEYS = {'about','contact','experience','skills','projects','flags'}

          total_creds = 0
          for f in FILES:
            if not os.path.exists(f):
              print(f'MISSING: {f}')
              sys.exit(1)
            with open(f, 'rb') as fh:
              try:
                data = json.loads(fh.read())
              except json.JSONDecodeError as e:
                print(f'INVALID JSON in {f}: {e}')
                sys.exit(1)
            if f == 'portfolio/data_main.json':
              missing = MAIN_KEYS - set(data.keys())
              if missing:
                print(f'data_main.json missing keys: {missing}')
                sys.exit(1)
            elif 'credentials' in f:
              creds = data.get('credentials', [])
              if not isinstance(creds, list):
                print(f'{f}: "credentials" must be a list')
                sys.exit(1)
              total_creds += len(creds)
            size_kb = os.path.getsize(f) / 1024
            print(f'OK {f}  ({size_kb:.1f} KB)')

          print(f'\nTotal credentials across all files: {total_creds}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
            out.write(f'total_creds={total_creds}\n')
          EOF

      - name: Print file stats summary
        id: stats
        run: |
          echo "### Split data files verified" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          for f in portfolio/data_main.json portfolio/data_creds_1.json portfolio/data_creds_2.json portfolio/data_creds_3.json portfolio/data_creds_4.json portfolio/data_creds_5.json; do
            SIZE=$(stat -c%s "$f")
            echo "| \`$f\` | ${SIZE} bytes |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "total_creds=${{ steps.verify_step.outputs.total_creds || 0 }}" >> "$GITHUB_OUTPUT"

  # ── Job 2: build + assemble site ───────────────────────────────────────────
  build:
    name: "② Build & assemble _site"
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Cache the compiled admin dist keyed to source files.
      # Data-only pushes hit this cache and skip the entire npm build.
      - name: Cache admin dist
        id: admin-dist-cache
        uses: actions/cache@v4
        with:
          path: admin/dist
          key: admin-dist-${{ runner.os }}-${{ hashFiles('admin/src/**', 'admin/package.json', 'admin/vite.config.js') }}
          restore-keys: |
            admin-dist-${{ runner.os }}-

      - name: Set up Node ${{ env.NODE_VERSION }}
        if: steps.admin-dist-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        if: steps.admin-dist-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('admin/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install admin dependencies
        if: steps.admin-dist-cache.outputs.cache-hit != 'true'
        working-directory: admin
        run: npm ci --no-audit --no-fund

      - name: Build admin panel (Vite)
        if: steps.admin-dist-cache.outputs.cache-hit != 'true'
        working-directory: admin
        run: npm run build
        env:
          VITE_BASE_URL: /admin/

      - name: Log build mode
        run: |
          if [ "${{ steps.admin-dist-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Data-only deploy — reusing cached admin dist (skipped npm build)"
          else
            echo "Full rebuild — admin panel compiled from source"
          fi

      - name: Assemble _site
        run: |
          set -euo pipefail

          mkdir -p _site/portfolio _site/admin

          # Portfolio HTML
          cp portfolio/index.html _site/index.html
          cp portfolio/index.html _site/404.html

          # LinkedIn logo (externalised from inline base64)
          [ -f portfolio/li-logo.jpg ] && cp portfolio/li-logo.jpg _site/portfolio/li-logo.jpg || true

          # All 5 split data files
          for f in portfolio/data_main.json portfolio/data_creds_1.json portfolio/data_creds_2.json portfolio/data_creds_3.json portfolio/data_creds_4.json portfolio/data_creds_5.json; do
            cp "$f" "_site/$f"
            echo "Copied $f ($(stat -c%s "_site/$f") bytes)"
          done

          # Admin panel (from cache or fresh build)
          if [ -d admin/dist ] && [ "$(ls -A admin/dist 2>/dev/null)" ]; then
            cp -r admin/dist/. _site/admin/
          else
            echo "FATAL: admin/dist is missing or empty"
            exit 1
          fi

          # Cache-control headers
          [ -f _headers ] && cp _headers _site/_headers || true

          # Integrity cross-check
          for f in portfolio/data_main.json portfolio/data_creds_1.json portfolio/data_creds_2.json portfolio/data_creds_3.json portfolio/data_creds_4.json portfolio/data_creds_5.json; do
            SRC=$(sha256sum "$f" | awk '{print $1}')
            DST=$(sha256sum "_site/$f" | awk '{print $1}')
            [ "$SRC" = "$DST" ] || { echo "FATAL: hash mismatch for $f"; exit 1; }
            echo "Verified: $f"
          done

      - name: Print _site manifest
        run: find _site -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ── Job 3: deploy to GitHub Pages ──────────────────────────────────────────
  deploy:
    name: "③ Deploy to GitHub Pages"
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

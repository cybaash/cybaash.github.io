##############################################################################
#  verify.yml — Verify all 5 split portfolio data files
#
#  Replaces the old "Verify data.json integrity" workflow which looked for
#  the now-deleted portfolio/data.json file (it was split into 5 files).
#
#  Runs on every push to main and can be triggered manually.
##############################################################################

name: Verify split data files

on:
  push:
    branches: [main]
    paths:
      - 'portfolio/data_main.json'
      - 'portfolio/data_creds_*.json'
      - 'scripts/verify_data.py'
  workflow_dispatch:

jobs:
  verify:
    name: Verify split data files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run split-file integrity check
        run: python scripts/verify_data.py --strict

      - name: Print summary
        if: always()
        run: |
          echo "### Data file verification" >> "$GITHUB_STEP_SUMMARY"
          echo "Checked: data_main.json + data_creds_1-4.json" >> "$GITHUB_STEP_SUMMARY"
